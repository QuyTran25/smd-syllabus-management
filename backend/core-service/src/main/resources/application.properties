# ============================================
# Spring Application Configuration
# ============================================
spring.application.name=smd-core-service
server.port=8081

# ============================================
# Database Configuration (PostgreSQL)
# ============================================
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/smd_database?currentSchema=core_service&useUnicode=true&characterEncoding=UTF-8&stringtype=unspecified
spring.datasource.username=smd_user
spring.datasource.password=smd_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=core_service
spring.jpa.open-in-view=false

# HTTP Encoding (đảm bảo UTF-8 toàn bộ)
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# ============================================
# Flyway Database Migration
# ============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=core_service
spring.flyway.validate-on-migrate=false
spring.flyway.baseline-version=0

# ============================================
# Redis Configuration (nếu dùng cache/session)
# ============================================
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.timeout=60000
# spring.data.redis.password= (nếu có password)

# ============================================
# RabbitMQ Configuration (nếu dùng message queue)
# ============================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ============================================
# Kafka Configuration (nếu dùng Kafka)
# ============================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=core-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ============================================
# Security / JWT Configuration (HS512 64 bytes key)
# ============================================
app.jwt.secret=${JWT_SECRET:smd-syllabus-management-super-secret-key-for-jwt-token-generation-2024-hs512-algorithm-64bytes!!}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ============================================
# Actuator & Management (monitor)
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,loggers
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.redis.enabled=true

# ============================================
# Logging Configuration (tăng debug khi cần)
# ============================================
logging.level.root=INFO
logging.level.vn.edu.smd=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ============================================
# SpringDoc OpenAPI / Swagger Configuration
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true