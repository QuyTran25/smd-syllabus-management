server:
  port: 8080

spring:
  application:
    name: smd-gateway
  cloud:
    gateway:
      routes:
        - id: core-service
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/**
          # StripPrefix=0 giúp giữ nguyên /api/ khi chuyển tiếp sang backend port 8081
          filters:
            - StripPrefix=0
            - PreserveHostHeader
            - SetRequestHeader=Content-Type, application/json
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations: # Thêm dấu gạch ngang ở đây
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:3002"
              - "http://localhost:3003"
              - "http://localhost:3004"
              - "http://localhost:3005"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# Giữ cấu hình Management từ Team để hỗ trợ giám sát hệ thống
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

# Enable detailed gateway/reactor/netty logging to trace header/body changes
logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty.http.client: DEBUG