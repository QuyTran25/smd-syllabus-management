server:
  port: 8888

spring:
  application:
    name: smd-gateway
  cloud:
    gateway:
      routes:
        - id: core-service
          # Dùng biến môi trường hoặc mặc định localhost:8081
          uri: ${CORE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=0
            - PreserveHostHeader
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:3002"
              - "http://localhost:3003"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# Cấu hình logging theo yêu cầu nhánh main để debug
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG

# Cấu hình quản lý Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always