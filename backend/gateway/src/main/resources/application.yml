server:
  port: 8080

spring:
  application:
    name: smd-gateway
  cloud:
    gateway:
      routes:
        - id: core-service
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/**
          filters:
            # Lưu ý: Không loại bỏ tiền tố `/api` — forward nguyên đường dẫn đến backend.
            # Nếu backend của bạn là /api/users -> dùng StripPrefix=0 (hoặc không set)
            # Nếu backend của bạn là /users -> dùng StripPrefix=1
            - StripPrefix=0
            - PreserveHostHeader
            - SetRequestHeader=Content-Type, application/json
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:3002"
              - "http://localhost:3003"
              - "http://localhost:3004"
              - "http://localhost:3005"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

# Cấu hình logging chi tiết (Giữ lại cấu hình của bạn vì nó TRACE kỹ hơn DEBUG của main)
logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty.http.client: DEBUG