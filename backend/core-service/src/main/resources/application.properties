# ============================================
# Spring Application Configuration
# ============================================
spring.application.name=smd-core-service
server.port=8081

# ============================================
# Database Configuration
# ============================================
# Sử dụng 127.0.0.1 thay vì localhost để tránh lỗi phân giải DNS chậm trên một số máy Windows
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/smd_database?options=-csearch_path=core_service,public&characterEncoding=UTF-8
spring.datasource.username=smd_user
spring.datasource.password=smd_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=core_service
spring.jpa.open-in-view=false

# HTTP Encoding
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# Flyway Configuration
# MERGE: Chọn cấu hình của bạn (HEAD) để tắt validate checksum (tránh lỗi khi sửa file SQL)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=core_service
spring.flyway.default-schema=core_service
spring.flyway.validate-on-migrate=false

# ============================================
# Redis Configuration
# ============================================
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# ============================================
# Security / JWT Configuration
# ============================================
# MERGE: Giữ lại Secret Key Hex (HEAD) để đảm bảo thuật toán HS512 hoạt động ổn định
app.jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A7134743777217A25432A462D4A614E645266556A586E3272357538782F413F4428472B4B}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ============================================
# Actuator & Management
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.redis.enabled=true

# ============================================
# Logging Configuration
# ============================================
logging.level.root=INFO
logging.level.vn.edu.smd=DEBUG
# MERGE: Kết hợp log của cả 2 bên để debug tốt nhất
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ============================================
# SpringDoc OpenAPI Configuration
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true