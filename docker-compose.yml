version: "3.8"

services:
  # ============================================
  # DATABASE: PostgreSQL with pgvector
  # ============================================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: smd-postgres
    environment:
      # ⭐ FIX CỨNG: Để khớp với application.properties (Theo Main)
      POSTGRES_DB: smd_database
      POSTGRES_USER: smd_user
      POSTGRES_PASSWORD: smd_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgresql/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
      - ./database/core-service:/docker-entrypoint-initdb.d/migrations/core-service
      - ./database/ai-service:/docker-entrypoint-initdb.d/migrations/ai-service
    networks:
      - smd-network
    healthcheck:
      # ⭐ FIX CỨNG: User healthcheck (Theo Main)
      test: ["CMD-SHELL", "pg_isready -U smd_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # CACHE: Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: smd-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - smd-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MESSAGE QUEUE: RabbitMQ
  # ============================================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: smd-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - smd-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # EVENT STREAMING: Zookeeper & Kafka
  # ============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: smd-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - smd-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: smd-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - smd-network
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 5

  # ============================================
  # BACKEND: API Gateway
  # ============================================
  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: smd-gateway
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8888 # ⭐ Ép chạy port 8888 (Theo Main)
      - CORE_SERVICE_URL=http://core-service:8081
      - AI_SERVICE_URL=http://ai-service:8082
    ports:
      - "8888:8888" # ⭐ Map ra ngoài port 8888 (Theo Main)
    depends_on:
      - core-service
    networks:
      - smd-network
    restart: unless-stopped

  # ============================================
  # BACKEND: Core Service (Java)
  # ============================================
  core-service:
    build:
      context: ./backend/core-service
      dockerfile: Dockerfile
    container_name: smd-core-service
    environment:
      - SPRING_PROFILES_ACTIVE=${ENVIRONMENT:-development}
      # ⭐ FIX CỨNG: Cập nhật connection string (Theo Main)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/smd_database
      - SPRING_DATASOURCE_USERNAME=smd_user
      - SPRING_DATASOURCE_PASSWORD=smd_password
      - SPRING_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smd-network

  # ============================================
  # BACKEND: AI Service (Python)
  # ============================================
  ai-service:
    build:
      context: .
      dockerfile: infrastructure/docker/ai-service/Dockerfile
    container_name: smd-ai-service
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      # ⭐ FIX CỨNG: Cập nhật connection string cho AI service (Theo Main)
      - DATABASE_URL=postgresql://smd_user:smd_password@postgres:5432/smd_database
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smd-network

  # ============================================
  # FRONTEND: React
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smd-frontend
    environment:
      - VITE_API_GATEWAY_URL=http://localhost:8888
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    networks:
      - smd-network

networks:
  smd-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  kafka_data:   